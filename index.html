<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funky Food - Delivery Pay Computations</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    /* Funky Food palette */
    --cream:       #fffaf5;
    --cream-dark:  #f5ede3;
    --olive:       #569556;
    --olive-mid:   #569556;
    --olive-light: #6aab6a;
    --olive-pale:  #e8f5e8;
    --peach:       #f0a07a;
    --peach-pale:  #fde8d8;
    --yellow:      #f5c842;
    --yellow-pale: #fef8d8;

    /* city accents */
    --brisbane:       #569556;
    --brisbane-light: #e8f5e8;
    --melbourne:      #569556;
    --melbourne-light: #eaf3e8;
    --sydney:         #569556;
    --sydney-light:   #ddeee3;

    --text:       #1b1c1e;
    --text-muted: #5a5a5a;
    --border:     #d8d2c4;
    --surface:    #ffffff;
    --surface2:   #f5f2ea;
    --shadow:     0 2px 14px rgba(30,58,47,0.08);
    --radius:     14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sora', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

  /* ── HEADER ── */
  header {
    background: var(--cream);
    color: #1b1c1e;
    padding: 0 36px;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(30,58,47,0.08); border-bottom: 1px solid var(--border);
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 44px; height: 44px; background: transparent; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .logo-wordmark { font-size: 15px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
  .logo-sub { font-size: 11px; opacity: 0.6; font-weight: 400; margin-top: 1px; letter-spacing: 0.3px; }
  .date-pill {
    background: var(--olive-pale); border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 14px; font-size: 12px; font-family: 'DM Mono', monospace;
  }

  /* ── TABS ── */
  .tabs-bar {
    background: var(--cream);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 32px; gap: 0;
    position: sticky; top: 64px; z-index: 99;
    overflow-x: auto;
  }
  .tab-btn {
    padding: 14px 20px; border: none; background: transparent; cursor: pointer;
    font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 600;
    color: #5a5a5a; border-bottom: 3px solid transparent;
    margin-bottom: -2px; white-space: nowrap; transition: all 0.15s;
    display: flex; align-items: center; gap: 7px;
  }
  .tab-btn:hover { color: #1b1c1e; }
  .tab-btn.active { color: #569556; border-bottom-color: #569556; }
  .tab-btn.weekly-tab { margin-left: auto; margin-right: auto; color: var(--text-muted); }
  .tab-btn.right-group { color: var(--text-muted); }
  .tab-btn.weekly-tab.active { color: #1b1c1e; border-bottom-color: var(--olive); }
  .tab-btn.right-group.active { color: #1b1c1e; border-bottom-color: var(--olive); }
  .tab-dots { display: flex; gap: 3px; align-items: center; }
  .tab-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); transition: background 0.2s; }
  .tab-dot.loaded.brisbane  { background: var(--brisbane); }
  .tab-dot.loaded.melbourne { background: var(--melbourne); }
  .tab-dot.loaded.sydney    { background: var(--sydney); }

  /* ── MAIN ── */
  main { max-width: 100%; margin: 0 auto; padding: 30px 28px; }

  /* ── CITY SECTION ── */
  .city-section {
    border-radius: var(--radius); overflow: hidden;
    margin-bottom: 22px; box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }
  .city-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 15px 22px; cursor: pointer; user-select: none;
    transition: opacity 0.15s;
  }
  .city-header:hover { opacity: 0.93; }
  .city-header.brisbane  { background: #569556; color: white; }
  .city-header.melbourne { background: #569556; color: white; }
  .city-header.sydney    { background: #569556; color: white; }
  .city-title { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 500; letter-spacing: -0.3px; }
  .city-pill { font-family: 'DM Mono', monospace; font-size: 10px; opacity: 0.75; background: rgba(255,255,255,0.18); padding: 3px 10px; border-radius: 20px; font-weight: 400; }
  .city-status { font-size: 11px; opacity: 0.8; }
  .city-chevron { font-size: 11px; opacity: 0.65; transition: transform 0.2s; }
  .city-chevron.open { transform: rotate(180deg); }
  .city-body { background: var(--surface); padding: 22px; }

  /* ── UPLOAD ── */
  .upload-pair { display: flex; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
  .upload-card {
    background: #f8f8f8; border-radius: 11px;
    border: 1px solid var(--border); padding: 20px 18px;
    text-align: center; cursor: pointer; transition: all 0.2s;
    flex: 1; min-width: 200px;
  }
  .upload-card:hover, .upload-card.drag-over { border-color: #c8c8c8; background: #f0f0f0; }
  .upload-card.locked { opacity: 0.38; pointer-events: none; }
  .upload-card.done { border-color: var(--border); background: #f8f8f8; }
  .upload-icon { font-size: 26px; margin-bottom: 7px; }
  .upload-card h3 { font-size: 12px; font-weight: 500; margin-bottom: 3px; color: #1b1c1e; }
  .upload-card p { font-size: 11px; color: var(--text-muted); }
  .upload-card input { display: none; }
  .upload-btn {
    margin-top: 10px; background: var(--cream); color: var(--olive); border: 1px solid var(--border);
    padding: 7px 16px; border-radius: 8px; font-family: 'Sora', sans-serif;
    font-size: 11px; font-weight: 700; cursor: pointer; transition: background 0.15s;
  }
  .upload-btn:hover { background: var(--cream-dark); }
  .file-name { margin-top: 7px; font-size: 10px; color: #1b1c1e; font-weight: 600; }

  /* ── CONFIG ── */
  .config-row { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
  .config-card { background: #f8f8f8; border-radius: 10px; padding: 12px 16px; flex: 1; min-width: 140px; border: 1px solid var(--border); }
  .config-card label { display: block; font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.8px; color: #5a5a5a; margin-bottom: 6px; }
  .config-card input { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-family: 'DM Mono', monospace; font-size: 13px; background: white; outline: none; color: var(--text); }
  .config-card input:focus { border-color: var(--olive-light); }

  /* ── SECTION TITLE ── */
  .section-title { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; color: #5a5a5a; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── DRIVER CARDS ── */
  .drivers-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .driver-card { background: white; border-radius: 11px; overflow: hidden; border: 1px solid var(--border); }
  .driver-header { background: #569556; color: white; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
  .driver-name { font-size: 13px; font-weight: 500; color: white; }
  .driver-stops { font-family: 'DM Mono', monospace; font-size: 10px; opacity: 0.75; background: rgba(255,255,255,0.15); padding: 2px 9px; border-radius: 12px; color: white; }
  .driver-body { padding: 14px; background: white; }
  .fields-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(142px, 1fr)); gap: 9px; margin-bottom: 11px; }
  .field-group { display: flex; flex-direction: column; gap: 3px; }
  .field-group label { font-size: 10px; font-weight: 400; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); }
  .field-group .val { font-family: 'DM Mono', monospace; font-size: 12px; background: white; border: 1px solid var(--border); border-radius: 6px; padding: 5px 8px; color: #1b1c1e; }
  .field-group input[type="number"], .field-group input[type="time"] { font-family: 'DM Mono', monospace; font-size: 12px; background: #fff; border: 1px solid var(--border); border-radius: 6px; padding: 5px 8px; outline: none; width: 100%; color: var(--text); }
  .field-group input:focus { box-shadow: 0 0 0 3px rgba(74,124,89,0.15); }
  .tag-input { background: var(--olive-pale) !important; border-color: var(--olive-light) !important; }
  .tag-input:focus { box-shadow: 0 0 0 3px rgba(74,124,89,0.18) !important; }

  /* ── RESULTS ── */
  .results-strip { display: grid; grid-template-columns: repeat(auto-fill, minmax(108px, 1fr)); gap: 7px; background: white; border-radius: 9px; padding: 11px; border: 1px solid var(--border); }
  .result-item { display: flex; flex-direction: column; gap: 2px; }
  .r-label { font-size: 10px; font-weight: 400; text-transform: uppercase; letter-spacing: 0.5px; color: #5a5a5a; }
  .r-val { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 400; color: #1b1c1e; }
  .r-val.warn { color: #e07a2f; } .r-val.bad { color: #c0392b !important; font-weight: 400; } .r-val.ok { color: #569556; }

  /* ── CITY SUMMARY ── */
  .city-summary { border-radius: 10px; overflow: hidden; margin-top: 18px; border: 1px solid var(--border); }
  .cs-head { padding: 10px 16px; font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.8px; }
  .cs-head.brisbane  { background: var(--brisbane-light);  color: var(--brisbane); }
  .cs-head.melbourne { background: var(--melbourne-light); color: var(--melbourne); }
  .cs-head.sydney    { background: var(--sydney-light);    color: var(--sydney); }
  .cs-table { width: 100%; border-collapse: collapse; background: white; }
  .cs-table th { font-size: 10px; font-weight: 400; text-transform: uppercase; letter-spacing: 0.6px; color: #5a5a5a; padding: 8px 14px; text-align: left; border-bottom: 1px solid var(--border); background: var(--cream); }
  .cs-table th:not(:first-child) { text-align: right; }
  .cs-table td { font-family: 'DM Mono', monospace; font-size: 11px; padding: 7px 14px; border-bottom: 1px solid var(--border); color: #1b1c1e; }
  .cs-table td:not(:first-child) { text-align: right; }
  .cs-table td:first-child { font-family: 'Sora', sans-serif; font-weight: 400; font-size: 11px; color: #1b1c1e; }
  .cs-table tfoot td { font-weight: 500; background: var(--cream); border-bottom: none; }

  /* ── ACTIONS ── */
  .actions-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 18px; }
  .export-btn { background: var(--olive); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-family: 'Sora', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; box-shadow: 0 3px 10px rgba(30,58,47,0.2); transition: all 0.15s; }
  .export-btn:hover { background: var(--olive-mid); transform: translateY(-1px); }
  .export-btn.orange { background: var(--olive-light); color: white; box-shadow: 0 3px 10px rgba(74,124,89,0.25); }
  .export-btn.orange:hover { background: var(--olive-mid); }
  .clear-btn { background: transparent; color: var(--text-muted); border: 1px solid var(--border); padding: 9px 14px; border-radius: 10px; font-family: 'Sora', sans-serif; font-size: 11px; cursor: pointer; transition: all 0.15s; }
  .clear-btn:hover { border-color: var(--olive-light); color: var(--olive-light); }

  /* ── EMPTY STATE ── */
  .empty-state { text-align: center; padding: 36px 20px; color: #5a5a5a; }
  .empty-state .emoji { font-size: 40px; margin-bottom: 10px; }
  .empty-state p { font-size: 13px; font-weight: 600; } .empty-state small { font-size: 11px; opacity: 0.7; }

  /* ── WEEKLY ── */
  .weekly-day-block { background: var(--surface); border-radius: var(--radius); box-shadow: none; overflow: hidden; margin-bottom: 16px; border: 1px solid var(--border); }
  .weekly-day-header { background: var(--olive-pale); color: #1b1c1e; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
  .weekly-day-header h3 { font-size: 14px; font-weight: 500; }
  .weekly-day-header .day-meta { font-family: 'DM Mono', monospace; font-size: 11px; color: #1b1c1e; }
  .weekly-city-label { padding: 7px 20px; font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.8px; }
  .weekly-city-label.brisbane  { background: var(--olive-pale); color: #1b1c1e; }
  .weekly-city-label.melbourne { background: var(--olive-pale); color: #1b1c1e; }
  .weekly-city-label.sydney    { background: var(--olive-pale); color: #1b1c1e; }
  .wi-table { width: 100%; border-collapse: collapse; }
  .wi-table th { font-size: 10px; font-weight: 400; text-transform: uppercase; letter-spacing: 0.6px; color: #5a5a5a; padding: 8px 12px 6px; text-align: left; border-bottom: 1px solid var(--border); background: var(--cream-dark); }
  .wi-table td { font-family: 'DM Mono', monospace; font-size: 11px; padding: 7px 12px; border-bottom: 1px solid var(--border); color: #1b1c1e; }
  .wi-table td:first-child { font-family: 'Sora', sans-serif; font-weight: 400; font-size: 11px; color: #1b1c1e; }
  .wi-table td:not(:first-child) { text-align: right; }
  .wi-table th:not(:first-child) { text-align: right; }
  .wi-table tr:last-child td { border-bottom: none; }

  .weekly-grand { background: var(--olive); color: white; border-radius: var(--radius); padding: 22px 28px; margin-bottom: 22px; }
  .weekly-grand h3 { font-size: 11px; font-weight: 400; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; margin-bottom: 16px; }
  .grand-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 16px; }
  .grand-item .grand-label { font-size: 10px; font-weight: 400; text-transform: uppercase; letter-spacing: 0.7px; opacity: 0.6; margin-bottom: 4px; }
  .grand-item .grand-val { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; }

  /* ── CITY SUB-TABS ── */
  .city-subtabs { display: flex; gap: 8px; margin-bottom: 22px; flex-wrap: wrap; }
  .city-subtab {
    display: flex; align-items: center; gap: 7px;
    padding: 9px 20px; border-radius: 30px; border: 1px solid var(--border);
    background: var(--surface); cursor: pointer; font-family: 'Sora', sans-serif;
    font-size: 13px; font-weight: 600; color: #5a5a5a; transition: all 0.15s;
  }
  .city-subtab:hover { border-color: var(--olive-light); color: #1b1c1e; }
  .city-subtab.active { background: var(--olive); color: white; border-color: var(--olive); }
  .city-subtab .subtab-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; opacity: 0.6; }
  .city-subtab.active .subtab-dot { opacity: 1; background: var(--olive-pale); }
  .city-subtab .subtab-status { font-size: 10px; opacity: 0.7; }

  @media (max-width:640px) { main { padding:14px; } header,.tabs-bar { padding-left:14px;padding-right:14px; } .fields-grid { grid-template-columns: 1fr 1fr; } }

  /* ── PAY PREVIEW CARDS ── */
  .preview-grid { display: flex; flex-direction: column; gap: 14px; }
  .preview-card {
    background: white; border-radius: 12px; overflow: hidden;
    border: 1px solid var(--border);
    max-width: 420px;
  }
  .preview-header {
    background: var(--olive); color: white;
    padding: 12px 18px; display: flex; justify-content: space-between; align-items: center;
  }
  .preview-driver { font-size: 15px; font-weight: 500; }
  .preview-zone { font-family: 'DM Mono', monospace; font-size: 12px; background: rgba(255,255,255,0.2); padding: 3px 10px; border-radius: 20px; }
  .preview-day { font-size: 11px; opacity: 0.7; margin-top: 2px; }
  .preview-body { padding: 16px 18px; }
  .preview-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 5px 0; border-bottom: 1px solid #f0f0f0; font-size: 12px; }
  .preview-row:last-child { border-bottom: none; }
  .preview-label { color: #666; font-size: 12px; font-family: 'Sora', sans-serif; }
  .preview-value { font-family: 'Sora', sans-serif; font-weight: 400; color: #1b1c1e; text-align: right; font-size: 12px; }
  .preview-value.highlight { color: #1b1c1e; font-weight: 400; }
  .preview-value.total { color: #1b1c1e; font-size: 13px; font-weight: 500; }
  .preview-calc { font-size: 11px; color: #999; font-family: 'Sora', sans-serif; margin-top: 2px; }
  .preview-divider { height: 1px; background: #eee; margin: 8px 0; }
  .preview-footer { background: var(--cream); padding: 10px 18px; font-size: 12px; color: var(--text-muted); display: flex; flex-direction: column; gap: 5px; font-family: 'Sora', sans-serif; }

  /* ── WEEK NAVIGATOR ── */
  .week-nav {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 10px 32px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 128px; z-index: 98;
  }
  .week-nav-center { display: flex; align-items: center; gap: 12px; }
  .week-arrow {
    width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--surface); cursor: pointer; display: flex; align-items: center;
    justify-content: center; font-size: 14px; color: var(--text-muted); transition: all 0.15s;
  }
  .week-arrow:hover { border-color: var(--olive); color: var(--olive); }
  .week-arrow:disabled { opacity: 0.3; cursor: not-allowed; }
  .week-label { font-size: 14px; font-weight: 500; color: var(--text); min-width: 160px; text-align: center; }
  .week-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px; margin-left: 6px; }
  .week-badge.current { background: var(--olive-pale); color: var(--olive); }
  .week-badge.archived { background: var(--cream-dark); color: var(--text-muted); }
  .week-nav-right { display: flex; align-items: center; gap: 8px; }
  .save-week-btn {
    background: var(--olive); color: white; border: none; padding: 7px 16px;
    border-radius: 8px; font-family: 'Sora', sans-serif; font-size: 12px; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
  }
  .save-week-btn:hover { background: var(--olive-light); }
  .archive-count { font-size: 11px; color: var(--text-muted); }
</style>

<body>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const CITY_CFG = {
  Brisbane:  { cls: 'brisbane',  flag: '', days: ['Tuesday','Wednesday','Thursday','Friday'] },
  Melbourne: { cls: 'melbourne', flag: '', days: ['Tuesday','Wednesday','Thursday','Friday'] },
  Sydney:    { cls: 'sydney',    flag: '', days: ['Wednesday','Thursday','Friday','Saturday'] }
};
const ALL_DAYS  = ['Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAY_NUMS  = {Tuesday:2,Wednesday:3,Thursday:4,Friday:5,Saturday:6};
const CITIES    = Object.keys(CITY_CFG);

const DAY_CITIES = {};
ALL_DAYS.forEach(day => { DAY_CITIES[day] = CITIES.filter(c => CITY_CFG[c].days.includes(day)); });

// ── STATE ─────────────────────────────────────────────────────────────────────
const state = {};
ALL_DAYS.forEach(day => {
  state[day] = {};
  DAY_CITIES[day].forEach(city => {
    const today = new Date();
    const diff  = (today.getDay() - DAY_NUMS[day] + 7) % 7;
    const d     = new Date(today); d.setDate(today.getDate() - diff);
    state[day][city] = { drivers:{}, date:d.toISOString().split('T')[0], estLoaded:false, actLoaded:false, _totals:{} };
  });
});

let activeTab = 'Tuesday';
const activeCity = {};
let activeWeeklyCity = 'Brisbane';
let activeFRCity = 'Brisbane';
let activeFuelCity = 'Brisbane';
let activeInvoiceCity = 'Brisbane';
let weekArchive = []; // array of saved week snapshots
let viewingArchiveIndex = -1; // -1 = current week, 0+ = archived week index
let archivedState = null; // holds the state when viewing an archive
let driverDetails = {}; // driverDetails[city][name] = {company,phone,abn,address,email,bsb,account}
let invoiceSettings = { submittedOn:'', invoiceStart:'040101', dueDate:'' };
const fuelVehicleType = {}; // fuelVehicleType[city][name] = 'Diesel'|'Petrol'
const frState = {}; // foodRelief[day][city] = { loaded, fileName, foodData: {driverName: count} }
// ── NUMBER FORMATTER ─────────────────────────────────────────────────────────
function fmtNum(v, decimals=2){
  return v.toLocaleString('en-AU', {minimumFractionDigits:decimals, maximumFractionDigits:decimals});
}
function fmtMoney(v, decimals=2){ return '$'+fmtNum(v, decimals); }

// ── AU DATE FORMATTER ────────────────────────────────────────────────────────
function auDate(d){if(!d)return'—';const p=d.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d;}

// ── AUTO DATE FROM TUESDAY ────────────────────────────────────────────────────
function setTuesdayDate(city, tuesdayVal){
  // Set Tuesday for all cities
  CITIES.forEach(c => { if(state['Tuesday'][c]) state['Tuesday'][c].date = tuesdayVal; });
  // Auto-fill Wed, Thu, Fri, Sat by adding days from Tuesday
  const base = new Date(tuesdayVal);
  const dayOffsets = {Tuesday:0, Wednesday:1, Thursday:2, Friday:3, Saturday:4};
  ALL_DAYS.forEach(day => {
    const d = new Date(base);
    d.setDate(base.getDate() + dayOffsets[day]);
    const iso = d.toISOString().split('T')[0];
    CITIES.forEach(c => { if(state[day][c]) state[day][c].date = iso; });
  });
  buildMain();
  updateWeekNav(); // refresh date range label
}

document.getElementById('todayDate').textContent = new Date().toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short',year:'numeric'});

// ── AUTO SAVE / LOAD ──────────────────────────────────────────────────────────
async function autoSaveSession(){
  try {
    const sessionData = {
      state: JSON.parse(JSON.stringify(state)),
      frState: JSON.parse(JSON.stringify(frState)),
      fuelVehicleType: JSON.parse(JSON.stringify(fuelVehicleType)),
      invoiceSettings: JSON.parse(JSON.stringify(invoiceSettings)),
      savedAt: new Date().toISOString()
    };
    // Save to localStorage immediately
    localStorage.setItem('funkyCurrentSession', JSON.stringify(sessionData));
    // Save to Firebase if available
    if(window._firebaseReady && window._db){
      const { doc, setDoc } = window._firestoreFns;
      await setDoc(doc(window._db, 'settings', 'currentSession'), sessionData);
    }
  } catch(e){ console.error('Auto-save error:', e); }
}

async function autoLoadSession(){
  try {
    let sessionData = null;
    // Try Firebase first
    if(window._firebaseReady && window._db){
      const { doc, getDoc } = window._firestoreFns;
      const snap = await getDoc(doc(window._db, 'settings', 'currentSession'));
      if(snap.exists()) sessionData = snap.data();
    }
    // Fallback to localStorage
    if(!sessionData){
      const saved = localStorage.getItem('funkyCurrentSession');
      if(saved) sessionData = JSON.parse(saved);
    }
    if(sessionData && sessionData.state){
      // Restore state
      ALL_DAYS.forEach(day=>{
        DAY_CITIES[day].forEach(city=>{
          if(sessionData.state[day]&&sessionData.state[day][city]){
            state[day][city] = sessionData.state[day][city];
          }
        });
      });
      if(sessionData.frState) Object.assign(frState, sessionData.frState);
      if(sessionData.fuelVehicleType) Object.assign(fuelVehicleType, sessionData.fuelVehicleType);
      if(sessionData.invoiceSettings) Object.assign(invoiceSettings, sessionData.invoiceSettings);
      console.log('Session restored!');
      buildTabs();
      buildMain();
      updateWeekNav();
    }
  } catch(e){ console.error('Auto-load error:', e); }
}

// ── WEEK ARCHIVE ─────────────────────────────────────────────────────────────
function getWeekLabel(tuesdayDate){
  if(!tuesdayDate) return 'Current Week';
  const start = new Date(tuesdayDate);
  const end = new Date(tuesdayDate); end.setDate(start.getDate()+4);
  const fmt = d => d.toLocaleDateString('en-AU',{day:'numeric',month:'short'});
  return fmt(start)+' – '+fmt(end);
}

function updateWeekNav(){
  const isArchive = viewingArchiveIndex >= 0;
  const label = document.getElementById('weekLabel');
  const badge = document.getElementById('weekBadge');
  const prev = document.getElementById('weekPrev');
  const next = document.getElementById('weekNext');
  const count = document.getElementById('archiveCount');
  if(!label) return;

  if(isArchive){
    const snap = weekArchive[viewingArchiveIndex];
    label.textContent = snap.label;
    badge.textContent = 'ARCHIVED ('+(viewingArchiveIndex+1)+' of '+weekArchive.length+')';
    badge.className = 'week-badge archived';
  } else {
    // get tuesday date from current state
    const tueDates = CITIES.map(c=>state['Tuesday'][c]?.date).filter(Boolean);
    label.textContent = tueDates.length ? getWeekLabel(tueDates[0]) : 'Current Week';
    badge.textContent = weekArchive.length>0 ? 'CURRENT ('+weekArchive.length+' archived)' : 'CURRENT';
    badge.className = 'week-badge current';
  }

  // PREV (older) button: disable when there are no archives, or already viewing the OLDEST one
  if(viewingArchiveIndex < 0){
    // on current week — can go back if any archives exist
    prev.disabled = weekArchive.length === 0;
  } else {
    // on an archived week — can go back if there's an older one
    prev.disabled = viewingArchiveIndex >= weekArchive.length - 1;
  }
  // NEXT (newer) button: disable only when already on current week
  next.disabled = viewingArchiveIndex < 0;

  // archive count hidden

  // disable save btn when viewing archive
  // Save Week always enabled
  const saveBtn = document.querySelector('.save-week-btn');
  if(saveBtn){ saveBtn.disabled = false; saveBtn.style.opacity = '1'; }
}

async function saveCurrentWeek(){
  // always save from actual current state (not archived view)
  const tueDates = CITIES.map(c=>state['Tuesday'][c]?.date).filter(Boolean);
  const label = tueDates.length ? getWeekLabel(tueDates[0]) : 'Week '+(weekArchive.length+1);

  // check if there's any data to save
  const hasData = ALL_DAYS.some(day=>DAY_CITIES[day].some(city=>state[day][city].estLoaded));
  if(!hasData){ alert('No data loaded yet! Please upload CSVs before saving.'); return; }

  // Stable ID derived from the Tuesday date — so re-saving the SAME week overwrites
  // (instead of creating a new doc each time). Falls back to label if no Tuesday date.
  const tueDate = tueDates[0] || '';
  const stableId = tueDate
    ? 'week_'+tueDate                                       // e.g. "week_2026-04-28"
    : 'week_'+label.replace(/[^a-zA-Z0-9]/g,'_');           // fallback

  // Check if a week with this label/id already exists in archive
  const existingIdx = weekArchive.findIndex(w => (w._id===stableId) || (w.label===label));
  if(existingIdx >= 0){
    if(!confirm('"'+label+'" is already saved. Overwrite with the latest data?')) return;
  } else {
    if(!confirm('Save "'+label+'" to archive? You can still view it later.')) return;
  }

  const snapshot = {
    _id: stableId,
    label,
    savedAt: new Date().toISOString(),
    state: JSON.parse(JSON.stringify(state)),
    frState: JSON.parse(JSON.stringify(frState)),
    fuelVehicleType: JSON.parse(JSON.stringify(fuelVehicleType)),
    invoiceSettings: JSON.parse(JSON.stringify(invoiceSettings)),
  };

  // Save to Firebase + localStorage backup
  try {
    // Remove any existing entry for this same week (label match), then add updated one
    for(let i=weekArchive.length-1; i>=0; i--){
      if(weekArchive[i].label===label || weekArchive[i]._id===stableId){
        weekArchive.splice(i,1);
      }
    }
    weekArchive.unshift(snapshot);
    weekArchive.sort((a,b) => new Date(b.savedAt) - new Date(a.savedAt));

    // Save to localStorage as backup
    try { localStorage.setItem('funkyDeliveryArchive', JSON.stringify(weekArchive)); } catch(e){}

    // Save to Firebase using the STABLE id (overwrites instead of duplicates)
    if(window._firebaseReady && window._db){
      const { doc, setDoc, getDocs, collection, deleteDoc } = window._firestoreFns;
      await setDoc(doc(window._db, 'weekArchive', stableId), snapshot);
      console.log('Saved to Firebase:', stableId);

      // Clean up any older duplicate documents for this same week (different label match)
      try {
        const allDocs = await getDocs(collection(window._db, 'weekArchive'));
        const toDelete = [];
        allDocs.forEach(d => {
          const data = d.data();
          if(d.id !== stableId && data.label === label){
            toDelete.push(d.id);
          }
        });
        for(const id of toDelete){
          await deleteDoc(doc(window._db, 'weekArchive', id));
          console.log('🗑 Deleted duplicate:', id);
        }
        if(toDelete.length){
          console.log('Cleaned up '+toDelete.length+' old duplicate(s) of "'+label+'"');
        }
      } catch(e){ console.warn('Duplicate cleanup skipped:', e); }
    }
    alert('✅ Week saved! Synced across all browsers and devices.');
    updateWeekNav();
  } catch(e) {
    console.error('Save error:', e);
    alert('Could not save — please try again.');
  }
}

// Store current week state when navigating away
let savedCurrentState = null;
let savedCurrentFR = null;
let savedCurrentFuel = null;

function navigateWeek(dir){
  if(dir === -1){
    // going back — save current week state first if not already archived
    if(viewingArchiveIndex < 0){
      savedCurrentState = JSON.parse(JSON.stringify(state));
      savedCurrentFR = JSON.parse(JSON.stringify(frState));
      savedCurrentFuel = JSON.parse(JSON.stringify(fuelVehicleType));
      viewingArchiveIndex = 0;
    } else {
      viewingArchiveIndex = Math.min(viewingArchiveIndex+1, weekArchive.length-1);
    }
  } else {
    // going forward toward current
    if(viewingArchiveIndex <= 0){
      viewingArchiveIndex = -1;
    } else {
      viewingArchiveIndex--;
    }
  }

  if(viewingArchiveIndex >= 0){
    // viewing archive — load snapshot into state for display only
    const snap = weekArchive[viewingArchiveIndex];
    // deep copy archive into state for display
    ALL_DAYS.forEach(day=>{
      DAY_CITIES[day].forEach(city=>{
        if(snap.state[day]&&snap.state[day][city])
          state[day][city]=JSON.parse(JSON.stringify(snap.state[day][city]));
      });
    });
    Object.keys(frState).forEach(k=>delete frState[k]);
    Object.assign(frState, JSON.parse(JSON.stringify(snap.frState||{})));
    Object.keys(fuelVehicleType).forEach(k=>delete fuelVehicleType[k]);
    Object.assign(fuelVehicleType, JSON.parse(JSON.stringify(snap.fuelVehicleType||{})));
  } else {
    // back to current — restore saved current state
    if(savedCurrentState){
      ALL_DAYS.forEach(day=>{
        DAY_CITIES[day].forEach(city=>{
          if(savedCurrentState[day]&&savedCurrentState[day][city])
            state[day][city]=JSON.parse(JSON.stringify(savedCurrentState[day][city]));
        });
      });
      Object.keys(frState).forEach(k=>delete frState[k]);
      if(savedCurrentFR) Object.assign(frState, JSON.parse(JSON.stringify(savedCurrentFR)));
      Object.keys(fuelVehicleType).forEach(k=>delete fuelVehicleType[k]);
      if(savedCurrentFuel) Object.assign(fuelVehicleType, JSON.parse(JSON.stringify(savedCurrentFuel)));
    }
  }

  updateWeekNav();
  buildMain();
}

async function loadArchiveFromStorage(){
  // Build UI immediately
  buildTabs();
  buildMain();
  updateWeekNav();
}

async function loadArchiveFromFirebase(){
  try {
    if(window._firebaseReady && window._db){
      const { getDocs, collection } = window._firestoreFns;
      const snapshot = await getDocs(collection(window._db, 'weekArchive'));
      const loaded = [];
      snapshot.forEach(d => loaded.push(d.data()));
      loaded.sort((a,b) => new Date(b.savedAt) - new Date(a.savedAt));
      weekArchive = loaded;
      // Sync to localStorage
      try { localStorage.setItem('funkyDeliveryArchive', JSON.stringify(weekArchive)); } catch(e){}
      console.log('☁️ Loaded '+weekArchive.length+' weeks from Firebase. Labels:', weekArchive.map(w=>w.label));
      updateWeekNav();
    } else {
      // Fallback localStorage
      try {
        const saved = localStorage.getItem('funkyDeliveryArchive');
        if(saved){ weekArchive = JSON.parse(saved); console.log('💾 Loaded '+weekArchive.length+' weeks from localStorage'); updateWeekNav(); }
      } catch(e){}
    }
  } catch(e) {
    console.error('Firebase archive load error:', e);
    try {
      const saved = localStorage.getItem('funkyDeliveryArchive');
      if(saved){ weekArchive = JSON.parse(saved); updateWeekNav(); }
    } catch(e2){}
  }
}

// ── CSV PARSER ────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const rows=[]; let cur='',inQ=false,row=[];
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(ch==='"'){if(inQ&&text[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(ch===','&&!inQ){row.push(cur.trim());cur='';}
    else if((ch==='\n'||ch==='\r')&&!inQ){
      if(ch==='\r'&&text[i+1]==='\n')i++;
      row.push(cur.trim());cur='';
      if(row.some(c=>c!==''))rows.push(row); row=[];
    } else cur+=ch;
  }
  if(cur||row.length){row.push(cur.trim());if(row.some(c=>c!==''))rows.push(row);}
  return rows;
}

// ── LOAD EST ──────────────────────────────────────────────────────────────────
function onEst(day,city,e){const f=e.target.files[0];if(f)loadEst(day,city,f);}
function onAct(day,city,e){const f=e.target.files[0];if(f)loadAct(day,city,f);}

function loadEst(day,city,file){
  const reader=new FileReader();
  reader.onload=e=>{
    const rows=parseCSV(e.target.result),h=rows[0],idx=k=>h.indexOf(k);
    const drivers={};
    for(let i=1;i<rows.length;i++){
      const r=rows[i],name=r[idx('Driver Name')],stop=parseInt(r[idx('Stop Number')]);
      const startAt=r[idx('Start at')]||'',km=parseFloat(r[idx('Distance(km)')])||0;
      if(!name)continue;
      if(!drivers[name])drivers[name]={name,stops:0,depotStart:null,depotEnd:null,totalKm:0,estLastTime:null,_c:{}};
      const d=drivers[name];
      if(stop===0){d.depotStart=startAt;continue;}
      if(stop===999){d.depotEnd=startAt;continue;}
      d.totalKm+=km;
      d.stops++;
      const finishBy=r[idx('Finish by')]||'';
      if(finishBy)d.estLastTime=finishBy;
    }
    Object.keys(drivers).forEach(n=>{if(!drivers[n].depotStart)delete drivers[n];});
    const s=state[day][city];
    s.drivers=drivers; s.estLoaded=true; s._estFile=file.name;
    updateDot(day,city); buildMain();
    setTimeout(()=>{ for(const name in state[day][city].drivers) compute(day,city,name); autoSaveSession(); }, 50);
  };
  reader.readAsText(file);
}

function loadAct(day,city,file){
  const reader=new FileReader();
  reader.onload=e=>{
    const rows=parseCSV(e.target.result),h=rows[0],idx=k=>h.indexOf(k);
    const act={};
    for(let i=1;i<rows.length;i++){
      const r=rows[i],name=r[idx('Driver Name')],stop=parseInt(r[idx('Stop Number')]);
      const startAt=r[idx('Start at')]||'',finishBy=r[idx('Finish by')]||'';
      if(!name)continue;
      if(!act[name])act[name]={firstStop:null,lastStop:null,actBoxes:0,foodBoxes:0};
      const d=act[name];
      if(stop===0||stop===999)continue;
      d.actBoxes++;
      const types=r[idx('Types')]||'';
      if(types.toUpperCase().includes('FOOD'))d.foodBoxes++;
      const t=finishBy||startAt;
      if(t){if(!d.firstStop)d.firstStop=t; d.lastStop=t;}
    }
    const key=`${day}-${city}`;
    for(const name in act){
      if(!state[day][city].drivers[name])continue;
      const a=act[name],dc=state[day][city].drivers[name]._c;
      dc._actFirst=a.firstStop?a.firstStop.substring(0,5):'';
      dc._actLast =a.lastStop ?a.lastStop.substring(0,5):'';
      if(a.actBoxes>0)dc.actBoxes=a.actBoxes;
      dc.foodBoxes=a.foodBoxes||0;
    }
    state[day][city].actLoaded=true; state[day][city]._actFile=file.name;
    updateDot(day,city); buildMain();
    setTimeout(()=>autoSaveSession(), 100);
    setTimeout(()=>{
      const k=`${day}-${city}`;
      for(const name in state[day][city].drivers){
        const dc=state[day][city].drivers[name]._c||{};
        const fd=document.getElementById(`${k}_${name}_actFirst_display`);
        const ld=document.getElementById(`${k}_${name}_actLast_display`);
        const bd=document.getElementById(`${k}_${name}_actBoxes_display`);
        const fh=document.getElementById(`${k}_${name}_actFirst`);
        const lh=document.getElementById(`${k}_${name}_actLast`);
        const bh=document.getElementById(`${k}_${name}_actBoxes`);
        if(fd&&dc._actFirst)fd.textContent=dc._actFirst;
        if(ld&&dc._actLast)ld.textContent=dc._actLast;
        if(bd&&dc.actBoxes)bd.textContent=dc.actBoxes;
        if(fh&&dc._actFirst)fh.value=dc._actFirst;
        if(lh&&dc._actLast)lh.value=dc._actLast;
        if(bh&&dc.actBoxes)bh.value=dc.actBoxes;
        compute(day,city,name);
      }
    },50);
  };
  reader.readAsText(file);
}

// ── TIME HELPERS ──────────────────────────────────────────────────────────────
function tM(t){if(!t)return null;const p=t.split(':');if(p.length<2)return null;return parseInt(p[0])*60+parseInt(p[1]);}
function mD(t1,t2){const a=tM(t1),b=tM(t2);if(a===null||b===null)return null;return(b-a)/60;}

// ── FIXED BONUS LABEL ────────────────────────────────────────────────────────
function getFixedRate(city, name){
  if(city==='Sydney' && (name==='PegahTwo' || name==='MatiasTwo')) return 57;
  return null;
}

function getFixedBonusLabel(day, city, name){
  const labels = [];
  if(name==='Lakmal' && city==='Brisbane' && day==='Friday') labels.push('+$125.00 (weekly bonus)');
  if(name==='Angus' && city==='Brisbane' && day==='Friday') labels.push('Final/Box fixed $8.00');
  if(name==='Dasharath' && city==='Melbourne' && day==='Friday') labels.push('+$50.00 (weekly bonus)');
  if(city==='Sydney') labels.push('+$12.00 (gate fee)');
  return labels.length ? labels.join(' · ') : null;
}

// ── COMPUTE ───────────────────────────────────────────────────────────────────
function compute(day,city,name){
  const d=state[day][city].drivers[name]; if(!d)return;
  const key=`${day}-${city}`;
  const s=state[day][city];
  let rate  = parseFloat(document.getElementById('rate-'+key)?.value)  || s._rate  || 62;
  const pbMin = parseFloat(document.getElementById('pbmin-'+key)?.value) || s._pbmin || 5;
  // ── FIXED RATE OVERRIDES ──────────────────────────────────────────────────
  if(city==='Sydney' && (name==='PegahTwo' || name==='MatiasTwo')) rate = 57;
  // ─────────────────────────────────────────────────────────────────────────
  const estBoxes = d.stops;
  const adj      = parseFloat(document.getElementById(`${key}_${name}_adj`)?.value)||0;
  const actBoxes = parseFloat(document.getElementById(`${key}_${name}_actBoxes`)?.value)||estBoxes;
  const bonus    = parseFloat(document.getElementById(`${key}_${name}_bonus`)?.value)||0;
  const actFirst = document.getElementById(`${key}_${name}_actFirst`)?.value||'';
  const actLast  = document.getElementById(`${key}_${name}_actLast`)?.value||'';

  const estHrs    = mD(d.depotStart,d.depotEnd)||0;
  const estPay    = rate*estHrs;
  const estPerBox = estBoxes>0?Math.round((estPay/estBoxes)*10)/10:0;
  let finalPerBox = Math.round((estPerBox<pbMin?pbMin:estPerBox)*10)/10;
  const actHrs    = actFirst&&actLast?mD(actFirst,actLast):null;
  const timeTaken = estBoxes>0?Math.round((estHrs*60/estBoxes)*10)/10:0;

  // ── FIXED BONUS RULES ────────────────────────────────────────────────────────
  let fixedBonus = 0;
  // Rule 1: Lakmal / Brisbane / Friday → +$125
  if(name==='Lakmal' && city==='Brisbane' && day==='Friday') fixedBonus += 125;
  // Rule 2: Angus / Brisbane / Friday → Final Per Box forced to $8.00
  if(name==='Angus' && city==='Brisbane' && day==='Friday') finalPerBox = 8.0;
  // Rule 3: Dasharath / Melbourne / Friday → +$50
  if(name==='Dasharath' && city==='Melbourne' && day==='Friday') fixedBonus += 50;
  // Rule 4: All Sydney drivers / Every day → +$12 market gate fee
  if(city==='Sydney') fixedBonus += 12;
  // ─────────────────────────────────────────────────────────────────────────────

  const foodBoxes   = d._c.foodBoxes||0;
  const foodRate    = 5.50;
  const foodDeduction = foodBoxes>0 ? (finalPerBox - foodRate) * foodBoxes * -1 : 0;
  const finalPay    = finalPerBox*actBoxes+(bonus+fixedBonus)+(adj*finalPerBox)+foodDeduction;
  const finalHourly = estHrs>0?finalPay/estHrs:0;
  // Speed = (Est Last Stop - Est First Stop) / (Act Last Stop - Act First Stop)
  const estFirstTime = d.depotStart||'';
  const estLastTime  = d.depotEnd||'';
  const estWindow = estFirstTime&&estLastTime ? mD(estFirstTime,estLastTime) : null;
  const actWindow = actFirst&&actLast ? mD(actFirst,actLast) : null;
  let speed=null;
  if(estWindow!==null&&actWindow!==null&&actWindow>0)speed=(estWindow/actWindow)*100;
  let sixPM='—';
  if(actLast){const m=tM(actLast);if(m<=1110)sixPM='Okay ✓';else{const ov=m-1110;sixPM=`+${Math.floor(ov/60)}:${String(ov%60).padStart(2,'0')} late`;}}

  const fmt=v=>'$'+v.toFixed(2),pct=v=>Math.round(v)+'%';
  sR(`${key}_${name}_estPay`,fmt(estPay));
  sR(`${key}_${name}_estPerBox`,fmt(estPerBox));
  sR(`${key}_${name}_finalPerBox`,fmt(finalPerBox),finalPerBox<=pbMin?'warn':'ok');
  sR(`${key}_${name}_finalHourly`,fmt(finalHourly));
  sR(`${key}_${name}_finalPay`,fmt(finalPay),'ok');
  sR(`${key}_${name}_timeTaken`,timeTaken>0?timeTaken.toFixed(1)+' min':'—');
  if(speed!==null)sR(`${key}_${name}_speed`,pct(speed),speed>=90?'ok':'bad');
  const sixPMClass = sixPM.includes('Okay') ? 'ok' : sixPM === '—' ? '' : (() => {
    const parts = sixPM.match(/\+(\d+):(\d+)/);
    if (!parts) return 'warn';
    const overMins = parseInt(parts[1])*60 + parseInt(parts[2]);
    return overMins >= 30 ? 'bad' : 'warn';
  })();
  sR(`${key}_${name}_6pm`, sixPM, sixPMClass);

  d._c={...d._c,actBoxes,estPay,estPerBox,finalPerBox,bonus,adj,fixedBonus,finalPay,speed,sixPM,finalHourly,timeTaken,_actFirst:actFirst,_actLast:actLast,foodBoxes,foodDeduction};

  // update totals
  let tB=0,tE=0,tF=0;
  for(const n in state[day][city].drivers){
    const c=state[day][city].drivers[n]._c||{};
    tB+=(c.actBoxes||state[day][city].drivers[n].stops);tE+=(c.estPay||0);tF+=(c.finalPay||0);
  }
  state[day][city]._totals={boxes:tB,est:tE,final:tF};
  // debounced auto-save
  clearTimeout(window._autoSaveTimer);
  window._autoSaveTimer = setTimeout(()=>autoSaveSession(), 2000);

  // live-update summary row
  const srow=document.getElementById(`srow-${day}-${city}-${name}`);
  if(srow){
    const spd=speed!=null?Math.round(speed)+'%':'—';
    const spdStyle=speed!=null&&speed<90?'color:#c0392b':'color:#569556';
    const sixStyle=sixPM.includes('Okay')?'color:#569556':sixPM==='—'?'':(()=>{
      const parts=sixPM.match(/\+(\d+):(\d+)/);
      if(!parts)return 'color:#5a5a5a';
      const ov=parseInt(parts[1])*60+parseInt(parts[2]);
      return ov>=30?'color:#c0392b':'color:#5a5a5a';
    })();
    srow.innerHTML=`
      <td>${name}</td>
      <td>${actBoxes}</td>
      <td>${fmtMoney(estPay)}</td>
      <td>${fmtMoney(finalPerBox)}</td>
      <td>${bonus?'$'+bonus.toFixed(2):'—'}</td>
      <td>${fmtMoney(finalPay)}</td>
      <td style="${spdStyle}">${spd}</td>
      <td style="${sixStyle}">${sixPM}</td>`;
  }
}

function sR(id,val,cls){const el=document.getElementById(id);if(!el)return;el.textContent=val;el.className='r-val'+(cls?' '+cls:'');}
function recomputeAll(day,city){for(const n in state[day][city].drivers)compute(day,city,n);}

// ── LOAD FOOD RELIEF CSV ──────────────────────────────────────────────────────
function loadFoodReliefCSV(day,city,event){
  const file=event.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const rows=parseCSV(e.target.result),h=rows[0];
    const foodData={};
    // detect column names — support both Routific full CSV and simplified food relief CSV
    const nameCol   = h.indexOf('Driver Name')>=0 ? 'Driver Name' : 'Driver';
    const typesCol  = h.indexOf('Types')>=0 ? 'Types' : h.indexOf('Food Relief')>=0 ? 'Food Relief' : null;
    const stopCol   = h.indexOf('Stop Number')>=0 ? 'Stop Number' : null;
    const idx = k => h.indexOf(k);
    for(let i=1;i<rows.length;i++){
      const r=rows[i];
      const name=(r[idx(nameCol)]||'').trim();
      if(!name)continue;
      // if there's a stop number column, skip depot stops
      if(stopCol){
        const stop=parseInt(r[idx(stopCol)]);
        if(stop===0||stop===999)continue;
      }
      const types=typesCol?(r[idx(typesCol)]||''):'';
      if(types.toUpperCase().includes('FOOD')){
        if(!foodData[name])foodData[name]=0;
        foodData[name]++;
      }
    }
    const frKey=`${day}-${city}`;
    frState[frKey]={loaded:true,fileName:file.name,foodData};
    renderFoodRelief();
  };
  reader.readAsText(file);
}

function driverFuelComp(name, city){
  if(!fuelVehicleType[city]) return 0;
  let km=0;
  ALL_DAYS.forEach(day=>{
    if(!DAY_CITIES[day].includes(city)) return;
    km += state[day][city].drivers[name]?.totalKm||0;
  });
  const vtype=(fuelVehicleType[city]&&fuelVehicleType[city][name])||'Diesel';
  const rates=FUEL_RATES[vtype];
  const litres=(km/100)*rates.economy;
  return (rates.newPrice-rates.base)*litres*REIMBURSE_RATE;
}

function setDriverDetail(city, name, field, value){
  if(!driverDetails[city]) driverDetails[city]={};
  if(!driverDetails[city][name]) driverDetails[city][name]={};
  driverDetails[city][name][field]=value;
}

async function saveDriverDetailsToFirebase(){
  try {
    if(window._firebaseReady && window._db){
      const { doc, setDoc } = window._firestoreFns;
      await setDoc(doc(window._db, 'settings', 'driverDetails'), { data: JSON.stringify(driverDetails), updatedAt: new Date().toISOString() });
      console.log('Driver details saved to Firebase!');
    }
    // Also save to localStorage as backup
    localStorage.setItem('funkyDriverDetails', JSON.stringify(driverDetails));
  } catch(e){ console.error('Could not save driver details:', e); }
}

async function loadDriverDetailsFromFirebase(){
  try {
    if(window._firebaseReady && window._db){
      const { doc, getDoc } = window._firestoreFns;
      const snap = await getDoc(doc(window._db, 'settings', 'driverDetails'));
      if(snap.exists()){
        driverDetails = JSON.parse(snap.data().data);
        console.log('Driver details loaded from Firebase!');
        renderInvoice();
        return;
      }
    }
  } catch(e){ console.error('Firebase load error:', e); }
  // Fallback to localStorage
  try {
    const saved = localStorage.getItem('funkyDriverDetails');
    if(saved){ driverDetails = JSON.parse(saved); renderInvoice(); }
  } catch(e){}
}

function loadDriverDetails(event){
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const rows=parseCSV(e.target.result),h=rows[0],idx=k=>h.indexOf(k);
    driverDetails={};
    for(let i=1;i<rows.length;i++){
      const r=rows[i];
      const city=(r[idx('City')]||'').trim();
      const name=(r[idx('Driver Name')]||'').trim();
      if(!city||!name) continue;
      if(!driverDetails[city]) driverDetails[city]={};
      driverDetails[city][name]={
        company: r[idx('Company Name')]||'',
        phone:   r[idx('Phone')]||'',
        abn:     r[idx('ABN')]||'',
        address: r[idx('Address')]||'',
        email:   r[idx('Email')]||'',
        bsb:     r[idx('BSB')]||'',
        account: r[idx('Account')]||'',
        gst:     r[idx('GST')]||'GST Valid',
        zone:    r[idx('ZONE')]||''
      };
    }
    // Save to Firebase permanently
    saveDriverDetailsToFirebase();
    renderInvoice();
  };
  reader.readAsText(file);
}

  // Add print styles
  let printStyle = document.getElementById('invoicePrintStyle');

function generateAllInvoices(city){
  const allDrivers=[];
  ALL_DAYS.forEach(day=>{ if(DAY_CITIES[day].includes(city)) Object.keys(state[day][city].drivers).forEach(n=>{ if(!allDrivers.includes(n)) allDrivers.push(n); }); });
  if(!allDrivers.length){ alert('No drivers loaded for '+city); return; }

  let num=parseInt(invoiceSettings.invoiceStart)||40101;

  // Build all invoice HTMLs combined into ONE scrollable PDF
  const invoices=[];
  allDrivers.forEach(name=>{
    const invNum=String(num).padStart(6,'0'); num++;
    const html=buildInvoiceHTML(name,city,invNum);
    if(html) invoices.push({name,invNum,html});
  });

  if(!invoices.length){ alert('No invoice data found for '+city); return; }

  // Combine all invoices into one HTML with page breaks between each
  const combinedHTML = invoices.map((inv,i)=>
    `<div style="${i>0?'page-break-before:always;':''}">${inv.html}</div>`
  ).join('');

  let modal=document.getElementById('invoiceModal');
  if(!modal){modal=document.createElement('div');modal.id='invoiceModal';modal.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:9999;overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:20px';document.body.appendChild(modal);}

  modal.innerHTML=`<div style="width:100%;max-width:820px;margin:0 auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div style="color:white;font-family:'Sora',sans-serif;font-weight:700;font-size:14px">🧾 All ${city} Invoices — ${invoices.length} drivers</div>
      <div style="display:flex;gap:8px">
        <button onclick="window.print()" style="background:#2d5a3d;color:white;border:none;padding:8px 18px;border-radius:8px;font-weight:700;cursor:pointer;font-size:12px">🖨 Print All as PDF</button>
        <button onclick="sendAllToDEXT()" style="background:#1a237e;color:white;border:none;padding:8px 16px;border-radius:8px;font-weight:700;cursor:pointer;font-size:12px">📤 Send All to DEXT</button>
        <button onclick="document.getElementById('invoiceModal').remove()" style="background:#555;color:white;border:none;padding:8px 14px;border-radius:8px;font-weight:700;cursor:pointer;font-size:12px">✕ Close</button>
      </div>
    </div>
    <div style="font-size:11px;color:rgba(255,255,255,0.6);margin-bottom:10px">All ${invoices.length} invoices combined — click 🖨 Print All as PDF to save as one file</div>
    <div id="invoiceContent" style="background:white;border-radius:12px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.3)">${combinedHTML}</div>
  </div>`;

  let ps=document.getElementById('invPS');
  if(!ps){ps=document.createElement('style');ps.id='invPS';document.head.appendChild(ps);}
  ps.textContent='@media print{body > *:not(#invoiceModal){display:none !important;}#invoiceModal{position:static !important;background:white !important;padding:0 !important;}#invoiceModal > div > div:first-child{display:none !important;}#invoiceModal > div > div:nth-child(2){display:none !important;}#invoiceContent{box-shadow:none !important;padding:0 !important;border-radius:0 !important;}}';
}

function buildInvoiceHTML(name,city,invNum){
  const det=(driverDetails[city]&&driverDetails[city][name])||{};
  const submittedOn=invoiceSettings.submittedOn||new Date().toISOString().split('T')[0];
  const dueDate=invoiceSettings.dueDate||'';
  const lineItems=[];
  ALL_DAYS.forEach(day=>{
    if(!DAY_CITIES[day].includes(city))return;
    const s=state[day][city]; if(!s.estLoaded)return;
    const date=s.date;
    if(invoiceSettings.dateFrom&&date<invoiceSettings.dateFrom)return;
    if(invoiceSettings.dateTo&&date>invoiceSettings.dateTo)return;
    const d=s.drivers[name]; if(!d)return;
    const cv=d._c||{};
    lineItems.push({date,qty:cv.actBoxes||d.stops,unitPrice:cv.finalPerBox||0,additional:(cv.bonus||0)+(cv.fixedBonus||0),total:cv.finalPay||0});
  });
  if(!lineItems.length) return null;
  const subtotal=lineItems.reduce((a,l)=>a+l.total,0);
  const totalBoxes=lineItems.reduce((a,l)=>a+l.qty,0);
  const fuelComp=driverFuelComp(name,city);
  const allDriverNames=new Set();ALL_DAYS.forEach(day=>{if(DAY_CITIES[day].includes(city))Object.keys(state[day][city].drivers).forEach(n=>allDriverNames.add(n));});
  let cityTotalPay=0,cityFRDed=0;
  allDriverNames.forEach(n2=>{ALL_DAYS.forEach(day=>{if(!DAY_CITIES[day].includes(city))return;cityTotalPay+=(state[day][city].drivers[n2]?._c?.finalPay||0);});});
  ALL_DAYS.forEach(day=>{if(!DAY_CITIES[day].includes(city))return;const fr=frState[day+'-'+city]||{};for(const n2 in state[day][city].drivers){const cv=state[day][city].drivers[n2]._c||{};const fb=fr.loaded?(fr.foodData?.[n2]||0):(cv.foodBoxes||0);if(fb>0)cityFRDed+=(cv.finalPerBox-5.50)*fb*-1;}});
  const frRate=cityTotalPay>0?cityFRDed/cityTotalPay:0;
  const frDeduction=subtotal*frRate;
  const isGSTInvalid=(det.gst||'').toUpperCase().includes('INVALID');
  const netBeforeGST=subtotal+frDeduction+fuelComp;
  const gstRemoval=isGSTInvalid?netBeforeGST/11:0;
  const totalDue=isGSTInvalid?netBeforeGST-gstRemoval:netBeforeGST;
  const gst=isGSTInvalid?0:totalDue/11;

  return `<style>@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap');
  .inv-wrap{font-family:'Sora',Arial,sans-serif;max-width:760px;margin:0 auto;padding:48px;color:#222;font-size:13px}
  .inv-company{color:#5b4fcf;font-size:22px;font-weight:800;margin-bottom:2px}.inv-dname{color:#5b4fcf;font-size:16px;font-weight:600;margin-bottom:14px}
  .inv-meta{color:#555;margin-bottom:3px;font-size:13px}.inv-title{font-size:52px;font-weight:900;color:#1a237e;margin:28px 0 4px;line-height:1}
  .inv-submitted{color:#e91e63;font-weight:700;font-size:15px;margin-bottom:28px}
  .inv-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;margin-bottom:28px}
  .inv-block-label{font-weight:700;font-size:13px;margin-bottom:8px;color:#222}.inv-block-val{font-size:13px;color:#555;line-height:1.7}
  hr{border:none;border-top:1px solid #ddd;margin:24px 0}
  table{width:100%;border-collapse:collapse;margin-bottom:16px}
  thead th{color:#1a237e;font-weight:700;padding:10px 14px;border-bottom:2px solid #1a237e;text-align:left;font-size:13px}
  tbody td{padding:10px 14px;border-bottom:1px solid #f0f0f0;font-size:13px;color:#333}
  .inv-subtotal td{font-weight:700;border-top:2px solid #ccc;border-bottom:none;background:#f9f9f9;color:#222}
  .inv-adj-row{display:flex;justify-content:space-between;padding:6px 14px;font-size:13px;color:#666;font-style:italic}
  .inv-adj-amt{font-weight:700;font-style:normal}.inv-adj-amt.fuel{color:#1a237e}.inv-adj-amt.charity{color:#c0392b}
  .inv-total-row{display:flex;justify-content:flex-end;align-items:center;gap:24px;margin-top:16px;padding:0 14px}
  .inv-total-label{font-size:16px;font-weight:700;color:#444}.inv-total-amt{font-size:28px;font-weight:900;color:#e91e63}
  .inv-gst{text-align:right;font-size:12px;color:#888;padding:4px 14px}</style>
  <div class="inv-wrap">
    <div class="inv-company">${det.company||name.toUpperCase()+' PTY LTD'}</div>
    <div class="inv-dname">(${name})</div>
    <div class="inv-meta">Phone: ${det.phone||'—'}</div><div class="inv-meta">ABN: &nbsp;${det.abn||'—'}</div>
    <div class="inv-meta">Address: ${det.address||'—'}</div><div class="inv-meta">Email: ${det.email||'—'}</div>
    <div class="inv-title">Invoice</div>
    <div class="inv-submitted">Submitted on ${auDate(submittedOn)}</div>
    <div class="inv-grid">
      <div><div class="inv-block-label">Invoice for</div><div class="inv-block-val">FUNKY FOOD AU PTY LTD<br>Unit 3/106 Medway Street<br>Rocklea QLD 4106</div></div>
      <div><div class="inv-block-label">Payable to</div><div class="inv-block-val">${det.company||name}<br>BSB: ${det.bsb||'—'}<br>Account: ${det.account||'—'}</div></div>
      <div><div class="inv-block-label">Invoice #</div><div class="inv-block-val" style="margin-bottom:12px">${invNum}</div><div class="inv-block-label">Due date</div><div class="inv-block-val">${auDate(dueDate)}</div></div>
    </div>
    <hr>
    <table><thead><tr><th>Delivery Date</th><th>Qty</th><th>Unit price</th><th>Additional</th><th style="text-align:right">Total</th></tr></thead>
    <tbody>${lineItems.map(l=>`<tr><td><strong>${auDate(l.date)}</strong></td><td>${l.qty}</td><td>${fmtNum(l.unitPrice,1)}</td><td>${l.additional?fmtMoney(l.additional):'0'}</td><td style="text-align:right">${fmtMoney(l.total)}</td></tr>`).join('')}
    <tr class="inv-subtotal"><td>Subtotal</td><td>${totalBoxes}</td><td></td><td></td><td style="text-align:right">${fmtMoney(subtotal)}</td></tr></tbody></table>
    ${fuelComp>0?`<div class="inv-adj-row"><span><em>Fuel Compensation</em></span><span>Adjustments <span class="inv-adj-amt fuel">${fmtMoney(fuelComp,0)}</span></span></div>`:''}
    ${frDeduction<0?`<div class="inv-adj-row"><span><em>Charity donation pool ${(frRate*100).toFixed(2)}%</em></span><span class="inv-adj-amt charity">${fmtNum(frDeduction)}</span></div>`:''}
    ${isGSTInvalid?`<div class="inv-adj-row"><span><em>GST Removal (÷11)</em></span><span class="inv-adj-amt charity">-${fmtMoney(gstRemoval)}</span></div>`:''}
    <div class="inv-total-row"><span class="inv-total-label">Total due</span><span class="inv-total-amt">${fmtMoney(totalDue)}</span></div>
    <div class="inv-gst">${isGSTInvalid?'<span style="color:#c0392b">GST Invalid — GST removed from total</span>':'GST inclusive: '+fmtMoney(gst)}</div>
  </div>`;
}

async function dedupeArchiveOnce(){
  if(!window._firebaseReady || !window._db) return;
  try {
    const { getDocs, collection, deleteDoc, doc } = window._firestoreFns;
    const snap = await getDocs(collection(window._db, 'weekArchive'));
    const byLabel = {}; // label -> {id, savedAt}
    const toDelete = [];
    snap.forEach(d => {
      const data = d.data();
      const lbl = data.label || d.id;
      if(!byLabel[lbl]){
        byLabel[lbl] = { id: d.id, savedAt: data.savedAt||'' };
      } else {
        // Keep the newer one, mark older for deletion
        const existing = byLabel[lbl];
        if((data.savedAt||'') > (existing.savedAt||'')){
          toDelete.push(existing.id);
          byLabel[lbl] = { id: d.id, savedAt: data.savedAt||'' };
        } else {
          toDelete.push(d.id);
        }
      }
    });
    if(!toDelete.length){ console.log('✓ No duplicate weeks to clean up'); return; }
    console.log('🧹 Cleaning up '+toDelete.length+' duplicate week archive(s)...');
    for(const id of toDelete){
      await deleteDoc(doc(window._db, 'weekArchive', id));
    }
    console.log('✓ Cleanup done. Reloading archive...');
    await loadArchiveFromFirebase();
  } catch(e){ console.error('Dedupe error:', e); }
}

// Start with localStorage data immediately
loadArchiveFromStorage();

// When Firebase is ready, reload everything from cloud
window._onFirebaseReady = async function(){
  console.log('Firebase ready — loading cloud data...');
  // Load archive FIRST so weekArchive is populated before anything else
  await loadArchiveFromFirebase();
  // Auto-clean up any duplicate weeks (same label, multiple docs) — keeps only newest per week
  await dedupeArchiveOnce();
  loadDriverDetailsFromFirebase();
  // Then load session — but DON'T let it call loadArchiveFromFirebase again
  await autoLoadSession();
  // Refresh nav now that everything is loaded
  updateWeekNav();
};

// If Firebase was already ready before this ran (unlikely but safe)
if(window._firebaseReady && window._db){
  window._onFirebaseReady();
}
